{% extends 'base.html' %}

{% block title %}Edit Question{% endblock %}

{% block content %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #111827);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #1f2937;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            color: #f3f4f6;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #9ca3af;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #374151;
            background: #0f172a;
            color: white;
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: 0.2s;
        }

        textarea:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #16a34a;
        }

        .hint {
            margin-top: 10px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }
    </style>

<body>

<div class="card">

    <h1>Edit Question</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Question Text</label>

        <textarea name="question_text">
{{ question.question_text }}
        </textarea>

        <button class="btn" type="submit">
            Save Changes
        </button>

    </form>

    <div class="hint">
        Ensure the question is clear before saving.
    </div>

</div>

</body>
{% endblock %}
