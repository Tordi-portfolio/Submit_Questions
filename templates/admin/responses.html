<!DOCTYPE html>
<html>
<head>
    <title>Student Responses</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #111827);
            color: #e5e7eb;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            color: #f3f4f6;
        }

        /* Table container */
        .table-wrapper {
            background: #1f2937;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: #111827;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #374151;
            font-size: 14px;
        }

        th {
            color: #9ca3af;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        td {
            color: #e5e7eb;
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        /* Badge styles */
        .student {
            color: #22c55e;
            font-weight: 600;
        }

        .answer {
            color: #f3f4f6;
        }

        .date {
            color: #9ca3af;
            font-size: 13px;
        }

        /* Responsive note */
        .hint {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Student Responses Dashboard</h1>

    <div class="table-wrapper">

        <table>

            <thead>
                <tr>
                    <th>Student</th>
                    <th>Question</th>
                    <th>Answer</th>
                    <th>Submitted At</th>
                </tr>
            </thead>

            <tbody>

                {% for a in answers %}

                <tr>
                    <td class="student">
                        {{ a.student.username }}
                    </td>

                    <td>
                        {{ a.question.question_text }}
                    </td>

                    <td class="answer">
                        {{ a.answer }}
                    </td>

                    <td class="date">
                        {{ a.submitted_at }}
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

    <div class="hint">
        Scroll horizontally on mobile for full table view
    </div>

</div>

</body>
</html>
