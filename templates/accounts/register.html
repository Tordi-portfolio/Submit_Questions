{<!DOCTYPE html>
<html>
<head>}
    <title>Student Registration</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #111827);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e5e7eb;
            padding: 20px;
        }

        .register-card {
            background: #1f2937;
            padding: 35px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            color: #f3f4f6;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Django form styling */
        form p {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 14px;
        }

        input, select {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #0f172a;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }

        button {
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #22c55e;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #16a34a;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .footer a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Error styling (optional if you add messages) */
        .errorlist {
            color: #f87171;
            font-size: 13px;
            list-style: none;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h1>Student Registration</h1>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Create Account</button>
    </form>

    <div class="footer">
        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>

</div>

</body>
</html>
