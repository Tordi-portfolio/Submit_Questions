{% extends 'base.html' %}

{% block title %}Assessment Completed{% endblock %}


{% block content %}

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #111827);
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #1f2937;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #22c55e;
        }

        p {
            color: #9ca3af;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .btn {
            display: inline-block;
            padding: 14px 22px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #16a34a;
        }

        .subtext {
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
        }
    </style>

<body>

<div class="card">

    <div class="emoji">🎉</div>

    <h1>Assessment Completed</h1>

    <p>You have successfully finished all questions in your assessment.</p>

    <a class="btn" href="/dashboard/">
        Go to Dashboard
    </a>

    <!-- <div class="subtext">
        You can review your performance in the dashboard.
    </div> -->

</div>

</body>
{% endblock %}
